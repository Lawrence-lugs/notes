name: Deploy Quarto Site to GitHub Pages

on:
  push:
    branches: [gh-pages]
    paths:
      - ".devcontainer/**"
      - "_quarto.yml"
      - "index.qmd"
      - "slides.qmd"
      - "notes/**"
      - "_notes/**"
      - "slides/**"
      - "styles.css"
      - "custom.scss"
      - "scripts/**"
      - ".github/workflows/test-quarto.yml"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/lawrence-lugs/quartolatex:latest

permissions:
  contents: write
  packages: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/gh-pages'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Set up actions-artifacts worktree and restore freeze cache
        run: |
          if git ls-remote --exit-code --heads origin actions-artifacts; then
            git fetch origin actions-artifacts:refs/heads/actions-artifacts
            git worktree add .freeze-cache actions-artifacts
          else
            git worktree add --orphan -b actions-artifacts .freeze-cache
          fi
          if [ -d .freeze-cache/_freeze ]; then
            rm -rf _freeze/
            cp -r .freeze-cache/_freeze .
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull prebuilt Quarto image
        run: docker pull "${{ env.IMAGE }}"

      - name: Bust freeze cache on global config change
        run: |
          CONFIG_HASH=$(for f in _quarto.yml custom.scss styles.css scripts/gfm_to_quarto_filter.lua; do
            [ -f "$f" ] && cat "$f"
          done | sha256sum | awk '{print $1}')
          STORED_HASH=$(cat _freeze/.config-hash 2>/dev/null || echo "")
          if [ "$CONFIG_HASH" != "$STORED_HASH" ]; then
            echo "Global config changed (or no prior cache) — busting _freeze/"
            rm -rf _freeze/
            mkdir -p _freeze/
            echo "$CONFIG_HASH" > _freeze/.config-hash
          else
            echo "Global config unchanged — reusing existing _freeze/"
          fi

      - name: Render site in container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            "${{ env.IMAGE }}" \
            quarto render

      - name: Update config hash sentinel in freeze
        run: |
          CONFIG_HASH=$(for f in _quarto.yml custom.scss styles.css scripts/gfm_to_quarto_filter.lua; do
            [ -f "$f" ] && cat "$f"
          done | sha256sum | awk '{print $1}')
          mkdir -p _freeze/
          echo "$CONFIG_HASH" > _freeze/.config-hash

      - name: Commit freeze cache to actions-artifacts
        run: |
          rsync -a --delete _freeze/ .freeze-cache/_freeze/
          cd .freeze-cache
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _freeze/
          git diff --staged --quiet || git commit -m "ci: update freeze cache [skip ci]"
          git push origin actions-artifacts

      - name: Set up Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
