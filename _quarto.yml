project:
  type: website
  output-dir: docs
  render:
    - "!tests/" # Don't render the tests lol...
    - "!_notes/" # This is the pre-preprocessed notes dir
    - "slides/"
    - "notes/"
    - "index.qmd"
  resources:
    - "googleba81d2991a90411e.html"
    - "slides/inPrep/imec_recent.html"
  pre-render:
    - scripts/collect_public_notes.py

# Pre-render script collects notes marked `public: true` from anywhere in
# the Obsidian vault into notes/, injecting path-based tags and rewriting
# inter-note links.  GFM→Quarto text transforms (callouts, mermaid) are
# applied globally by the Lua filter below at render time.

filters:
  - scripts/gfm_to_quarto_filter.lua

format:
  html:
    theme: [sandstone, custom.scss]
    fontsize: 16pt
    fig-align: center
    lightbox: true
    css: styles.css
    code-line-numbers: true
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Source+Sans+3:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

execute:
  freeze: auto
  cache: true

website:
  title: L.Quizon
  navbar:
    background: "#2D2A26"
    left:
      - href: index.qmd
        text: Home

    search: true
